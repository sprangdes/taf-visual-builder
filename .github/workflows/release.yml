name: Release Zip Package

on:
  push:
    tags:
      - "release*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tag commit is on main
        run: |
          git fetch origin main --depth=1
          if git branch -r --contains "$GITHUB_SHA" | grep -q "origin/main"; then
            echo "Tag commit is on main."
          else
            echo "Error: release tag must point to a commit on main."
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build release zip
        run: npm run release:zip

      - name: Create GitHub Release and upload asset
        uses: softprops/action-gh-release@v2
        with:
          files: taf-visual-builder.zip
          generate_release_notes: true
